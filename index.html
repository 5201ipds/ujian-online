<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aplikasi Web Ujian Google Sheet</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800">
  <main class="max-w-5xl mx-auto p-4 md:p-8">
    <section class="bg-white rounded-2xl shadow p-6 mb-6">
      <h1 class="text-2xl md:text-3xl font-bold mb-2">Aplikasi Web Ujian</h1>
      <p class="text-slate-600 mb-4">
        Soal dibaca dari tab <b>soal</b>, pengaturan dari tab <b>pengaturan</b>, dan jawaban disimpan ke tab <b>respon</b>.
      </p>

      <div id="periodeInfo" class="hidden bg-blue-50 border border-blue-200 rounded-xl p-4 mb-4 text-sm"></div>

      <div class="grid md:grid-cols-2 gap-4">
        <div>
          <label class="font-semibold block mb-2">Nama</label>
          <input id="nama" type="text" placeholder="Nama peserta" class="w-full border rounded-xl p-3" />
        </div>
        <div>
          <label class="font-semibold block mb-2">Email</label>
          <input id="email" type="email" placeholder="email@domain.com" class="w-full border rounded-xl p-3" />
        </div>
      </div>

      <div class="mt-4 flex flex-wrap gap-3">
        <button onclick="ambilSoal()" class="px-4 py-2 rounded-xl bg-slate-700 text-white hover:bg-slate-800">Ambil Soal</button>
        <button onclick="mulaiUjian()" class="px-4 py-2 rounded-xl bg-blue-600 text-white hover:bg-blue-700">Mulai Ujian</button>
      </div>
    </section>

    <section id="areaInfo" class="hidden bg-amber-50 border border-amber-200 rounded-2xl p-4 mb-6"></section>

    <section id="areaUjian" class="hidden bg-white rounded-2xl shadow p-6 mb-6">
      <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
        <h2 class="text-xl font-bold">Form Ujian</h2>
        <div id="timerUjian" class="bg-red-100 text-red-700 font-bold px-4 py-2 rounded-xl">
          Sisa Waktu: 60:00
        </div>
      </div>
      <form id="formUjian" class="space-y-5"></form>
      <button onclick="kirimJawaban(false)" class="mt-6 px-5 py-3 rounded-xl bg-green-600 text-white hover:bg-green-700">Kirim Jawaban</button>
    </section>
  </main>

  <script>
    // GANTI URL INI dengan URL Web App Google Apps Script Anda.
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwzd1OTpKqPeTtMPUkMlviW2u0xPpFWMrE72e8ISUCvwmRBllAuIsB4mt6VRoSJrSzc-g/exec';

    let bankSoal = [];
    let pengaturan = null;
    let sedangKirim = false;
    let waktuMulaiUjian = null;
    let durasiMenit = 60;
    let timerInterval = null;
    let sudahAutoSubmit = false;

    async function ambilSoal() {
      if (!GAS_URL || GAS_URL.includes('PASTE_URL')) {
        tampilInfo('GAS_URL belum diisi. Deploy Apps Script dulu, lalu tempel URL Web App ke kode HTML.');
        return;
      }

      tampilInfo('Mengambil soal dari Google Sheet...');

      try {
        const response = await fetch(`${GAS_URL}?action=getSoal&cache=${Date.now()}`);
        const result = await response.json();

        if (!result.success) throw new Error(result.message || 'Gagal mengambil soal.');

        bankSoal = result.data.soal;
        pengaturan = result.data.pengaturan;
        durasiMenit = Number(pengaturan.durasiMenit || 60);

        tampilPeriode(pengaturan);
        tampilInfo(`${bankSoal.length} soal berhasil dimuat dari Google Sheet.`);
      } catch (error) {
        tampilInfo('Gagal mengambil soal: ' + error.message);
      }
    }

    async function mulaiUjian() {
      const nama = document.getElementById('nama').value.trim();
      const email = document.getElementById('email').value.trim().toLowerCase();

      if (!nama || !email) {
        tampilInfo('Nama dan email wajib diisi.');
        return;
      }

      if (bankSoal.length === 0) {
        tampilInfo('Klik tombol Ambil Soal terlebih dahulu.');
        return;
      }

      try {
        tampilInfo('Mengecek status peserta dan periode ujian...');
        const response = await fetch(`${GAS_URL}?action=cekPeserta&email=${encodeURIComponent(email)}&cache=${Date.now()}`);
        const result = await response.json();

        if (!result.success) throw new Error(result.message || 'Tidak bisa memulai ujian.');

        renderSoal();
        waktuMulaiUjian = Date.now();
        sudahAutoSubmit = false;
        mulaiTimer();

        document.getElementById('areaUjian').classList.remove('hidden');
        tampilInfo('Ujian dimulai. Timer berjalan sejak tombol Mulai Ujian ditekan.');
      } catch (error) {
        document.getElementById('areaUjian').classList.add('hidden');
        tampilInfo(error.message);
      }
    }

    function renderSoal() {
      const form = document.getElementById('formUjian');
      form.innerHTML = '';

      bankSoal.forEach((soal, index) => {
        const pilihan = acakArray([soal.benar, ...soal.salah]);
        const div = document.createElement('div');
        div.className = 'border rounded-2xl p-4';
        div.innerHTML = `
          <p class="font-semibold mb-3">${index + 1}. ${escapeHtml(soal.idsoal)}</p>
          <div class="grid sm:grid-cols-2 md:grid-cols-5 gap-2">
            ${pilihan.map(p => `
              <label class="border rounded-xl p-3 cursor-pointer hover:bg-slate-50">
                <input type="radio" name="${escapeHtml(soal.idsoal)}" value="${escapeHtml(p)}" class="mr-2" />
                ${escapeHtml(p)}
              </label>
            `).join('')}
          </div>
        `;
        form.appendChild(div);
      });
    }

    function mulaiTimer() {
      clearInterval(timerInterval);
      const timerEl = document.getElementById('timerUjian');

      function updateTimer() {
        const selesai = waktuMulaiUjian + durasiMenit * 60 * 1000;
        const sisa = selesai - Date.now();

        if (sisa <= 0) {
          clearInterval(timerInterval);
          timerEl.textContent = 'Waktu Habis';
          autoSubmitKarenaWaktuHabis();
          return;
        }

        const menit = Math.floor(sisa / 1000 / 60);
        const detik = Math.floor((sisa / 1000) % 60);
        timerEl.textContent = `Sisa Waktu: ${String(menit).padStart(2, '0')}:${String(detik).padStart(2, '0')}`;
      }

      updateTimer();
      timerInterval = setInterval(updateTimer, 1000);
    }

    async function autoSubmitKarenaWaktuHabis() {
      if (sudahAutoSubmit) return;
      sudahAutoSubmit = true;
      tampilInfo('Waktu ujian habis. Jawaban yang sudah terisi akan otomatis dikirim.');
      await kirimJawaban(true);
    }

    async function kirimJawaban(forceSubmit) {
      if (sedangKirim) return;

      const nama = document.getElementById('nama').value.trim();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const jawaban = {};
      let skor = 0;

      for (const soal of bankSoal) {
        const input = document.querySelector(`input[name="${cssEscape(soal.idsoal)}"]:checked`);

        if (!input) {
          if (forceSubmit) {
            jawaban[soal.idsoal] = '';
            continue;
          }

          tampilInfo(`Soal "${soal.idsoal}" belum dijawab.`);
          return;
        }

        jawaban[soal.idsoal] = input.value;
        if (input.value === soal.benar) skor++;
      }

      const payload = {
        action: 'saveRespon',
        nama,
        email,
        jawaban,
        skor,
        total: bankSoal.length,
        waktuMulai: waktuMulaiUjian ? new Date(waktuMulaiUjian).toISOString() : '',
        waktuKirim: new Date().toISOString(),
        durasiMenit
      };

      try {
        sedangKirim = true;
        tampilInfo('Mengirim jawaban ke Google Sheet...');

        const response = await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });

        const result = await response.json();
        if (!result.success) throw new Error(result.message || 'Gagal menyimpan jawaban.');

        clearInterval(timerInterval);
        tampilInfo(`Jawaban berhasil dikirim. Skor: ${skor}/${bankSoal.length}`);
        document.getElementById('areaUjian').classList.add('hidden');
      } catch (error) {
        tampilInfo(error.message);
      } finally {
        sedangKirim = false;
      }
    }

    function tampilPeriode(data) {
      const el = document.getElementById('periodeInfo');
      if (!data) return;

      el.innerHTML = `
        <b>Pengaturan Ujian</b><br>
        Periode Dibuka: ${escapeHtml(data.mulai || '-')}<br>
        Periode Ditutup: ${escapeHtml(data.selesai || '-')}<br>
        Durasi Pengerjaan: ${escapeHtml(data.durasiMenit || 60)} menit<br>
        Status Periode: ${data.aktif ? '<b class="text-green-700">Aktif</b>' : '<b class="text-red-700">Tidak aktif</b>'}
      `;
      el.classList.remove('hidden');
    }

    function acakArray(arr) {
      return [...arr].sort(() => Math.random() - 0.5);
    }

    function tampilInfo(pesan) {
      const area = document.getElementById('areaInfo');
      area.textContent = pesan;
      area.classList.remove('hidden');
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function cssEscape(value) {
      if (window.CSS && CSS.escape) return CSS.escape(value);
      return String(value).replace(/[^a-zA-Z0-9_-]/g, '\\$&');
    }
  </script>
</body>
</html>
