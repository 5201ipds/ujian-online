<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Ujian Online</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="./css/style.css" />

  <script src="./js/config.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/peserta.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="bg-slate-100 min-h-screen text-slate-800">

  <main class="max-w-5xl mx-auto p-4 md:p-8">

    <!-- HEADER -->
    <section class="bg-white rounded-3xl shadow-lg p-6 mb-6">

      <div class="flex items-start justify-between gap-4 mb-4">

        <div>
          <h1 class="text-2xl md:text-3xl font-bold mb-2">
            Aplikasi Web Ujian
          </h1>

          <p class="text-slate-600">
            Sistem ujian online berbasis Google Sheet
          </p>
        </div>

        <!-- Tombol Admin -->
        <a
          href="./admin.html"
          class="w-12 h-12 rounded-full bg-purple-600 hover:bg-purple-700 text-white flex items-center justify-center shadow-lg transition"
          title="Admin"
        >
          <svg xmlns="http://www.w3.org/2000/svg"
               fill="none"
               viewBox="0 0 24 24"
               stroke-width="1.8"
               stroke="currentColor"
               class="w-6 h-6">

            <path stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M15.75 6.75a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
          </svg>
        </a>

      </div>

      <!-- INFO UJIAN -->
      <div
        id="periodeInfo"
        class="hidden bg-blue-50 border border-blue-200 rounded-2xl p-4 mb-4 text-sm">
      </div>

      <!-- FORM PESERTA -->
      <div class="grid md:grid-cols-2 gap-4">

        <div>
          <label class="font-semibold block mb-2">
            Nama
          </label>

          <input
            id="nama"
            type="text"
            placeholder="Nama peserta"
            class="w-full border rounded-2xl p-3"
          />
        </div>

        <div>
          <label class="font-semibold block mb-2">
            Email
          </label>

          <input
            id="email"
            type="email"
            placeholder="email@domain.com"
            class="w-full border rounded-2xl p-3"
          />
        </div>

      </div>

      <!-- TOMBOL -->
      <div class="mt-6 flex items-center justify-between gap-4">

        <button
          id="btnAmbilSoal"
          class="px-6 py-3 rounded-2xl bg-slate-700 text-white hover:bg-slate-800 font-semibold shadow transition"
        >
          Ambil Soal
        </button>

        <button
          id="btnMulai"
          class="px-6 py-3 rounded-2xl bg-blue-600 text-white hover:bg-blue-700 font-semibold shadow transition"
        >
          Mulai Ujian
        </button>

      </div>

    </section>

    <!-- INFO -->
    <section
      id="areaInfo"
      class="hidden bg-amber-50 border border-amber-200 rounded-2xl p-4 mb-6">
    </section>

    <!-- AREA UJIAN -->
    <section
      id="areaUjian"
      class="hidden bg-white rounded-3xl shadow-lg p-5 md:p-8 mb-6 border border-slate-200">

      <!-- HEADER UJIAN -->
      <div class="sticky top-0 z-20 -mx-5 md:-mx-8 px-5 md:px-8 py-4 mb-6 bg-white/95 backdrop-blur border-b border-slate-200 rounded-t-3xl">

        <div class="flex flex-wrap items-center justify-between gap-3">

          <div>
            <h2 class="text-2xl font-bold">
              Form Ujian
            </h2>

            <p class="text-sm text-slate-500 mt-1">
              Pilih satu jawaban terbaik
            </p>
          </div>

          <div
            id="timerUjian"
            class="bg-red-100 text-red-700 font-bold px-5 py-3 rounded-2xl border border-red-200 shadow-sm">
            Sisa Waktu: 60:00
          </div>

        </div>

      </div>

      <!-- FORM SOAL -->
      <form id="formUjian" class="space-y-6"></form>

      <!-- FOOTER -->
      <div class="mt-8 pt-6 border-t border-slate-200 flex justify-end">

        <button
          id="btnKirim"
          class="px-7 py-3 rounded-2xl bg-green-600 text-white hover:bg-green-700 font-semibold shadow transition">
          Kirim Jawaban
        </button>

      </div>

    </section>

  </main>

</body>
</html>
