<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aplikasi Web Ujian Google Sheet</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800">
  <main class="max-w-5xl mx-auto p-4 md:p-8">
    <section class="bg-white rounded-2xl shadow p-6 mb-6">
      <h1 class="text-2xl md:text-3xl font-bold mb-2">Aplikasi Web Ujian</h1>
      <p class="text-slate-600 mb-4">
        Soal dibaca dari tab <b>soal</b>, lalu jawaban peserta disimpan ke tab <b>respon</b> di Google Sheet.
      </p>

      <div class="grid md:grid-cols-2 gap-4">
        <div>
          <label class="font-semibold block mb-2">Nama</label>
          <input id="nama" type="text" placeholder="Nama peserta" class="w-full border rounded-xl p-3" />
        </div>
        <div>
          <label class="font-semibold block mb-2">Email</label>
          <input id="email" type="email" placeholder="email@domain.com" class="w-full border rounded-xl p-3" />
        </div>
      </div>

      <div class="mt-4 flex flex-wrap gap-3">
        <button onclick="ambilSoal()" class="px-4 py-2 rounded-xl bg-slate-700 text-white hover:bg-slate-800">Ambil Soal</button>
        <button onclick="mulaiUjian()" class="px-4 py-2 rounded-xl bg-blue-600 text-white hover:bg-blue-700">Mulai Ujian</button>
      </div>
    </section>

    <section id="areaInfo" class="hidden bg-amber-50 border border-amber-200 rounded-2xl p-4 mb-6"></section>

    <section id="areaUjian" class="hidden bg-white rounded-2xl shadow p-6 mb-6">
      <h2 class="text-xl font-bold mb-4">Form Ujian</h2>
      <form id="formUjian" class="space-y-5"></form>
      <button onclick="kirimJawaban()" class="mt-6 px-5 py-3 rounded-xl bg-green-600 text-white hover:bg-green-700">Kirim Jawaban</button>
    </section>
  </main>

  <script>
    // GANTI URL INI dengan URL Web App Google Apps Script Anda.
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwzd1OTpKqPeTtMPUkMlviW2u0xPpFWMrE72e8ISUCvwmRBllAuIsB4mt6VRoSJrSzc-g/exec';

    let bankSoal = [];
    let sedangKirim = false;

    async function ambilSoal() {
      if (!GAS_URL || GAS_URL.includes('PASTE_URL')) {
        tampilInfo('GAS_URL belum diisi. Deploy Apps Script dulu, lalu tempel URL Web App ke kode HTML.');
        return;
      }

      tampilInfo('Mengambil soal dari Google Sheet...');

      try {
        const response = await fetch(`${GAS_URL}?action=getSoal&cache=${Date.now()}`);
        const result = await response.json();

        if (!result.success) throw new Error(result.message || 'Gagal mengambil soal.');

        bankSoal = result.data;
        tampilInfo(`${bankSoal.length} soal berhasil dimuat dari Google Sheet.`);
      } catch (error) {
        tampilInfo('Gagal mengambil soal: ' + error.message);
      }
    }

    function mulaiUjian() {
      const nama = document.getElementById('nama').value.trim();
      const email = document.getElementById('email').value.trim();

      if (!nama || !email) {
        tampilInfo('Nama dan email wajib diisi.');
        return;
      }

      if (bankSoal.length === 0) {
        tampilInfo('Klik tombol Ambil Soal terlebih dahulu.');
        return;
      }

      const form = document.getElementById('formUjian');
      form.innerHTML = '';

      bankSoal.forEach((soal, index) => {
        const pilihan = acakArray([soal.benar, ...soal.salah]);
        const div = document.createElement('div');
        div.className = 'border rounded-2xl p-4';
        div.innerHTML = `
          <p class="font-semibold mb-3">${index + 1}. ${escapeHtml(soal.idsoal)}</p>
          <div class="grid sm:grid-cols-2 md:grid-cols-5 gap-2">
            ${pilihan.map(p => `
              <label class="border rounded-xl p-3 cursor-pointer hover:bg-slate-50">
                <input type="radio" name="${escapeHtml(soal.idsoal)}" value="${escapeHtml(p)}" class="mr-2" />
                ${escapeHtml(p)}
              </label>
            `).join('')}
          </div>
        `;
        form.appendChild(div);
      });

      document.getElementById('areaUjian').classList.remove('hidden');
      tampilInfo('Ujian siap dikerjakan.');
    }

    async function kirimJawaban() {
      if (sedangKirim) return;

      const nama = document.getElementById('nama').value.trim();
      const email = document.getElementById('email').value.trim();
      const jawaban = {};
      let skor = 0;

      for (const soal of bankSoal) {
        const input = document.querySelector(`input[name="${cssEscape(soal.idsoal)}"]:checked`);
        if (!input) {
          tampilInfo(`Soal "${soal.idsoal}" belum dijawab.`);
          return;
        }

        jawaban[soal.idsoal] = input.value;
        if (input.value === soal.benar) skor++;
      }

      const payload = {
        action: 'saveRespon',
        nama,
        email,
        jawaban,
        skor,
        total: bankSoal.length,
        waktu: new Date().toISOString()
      };

      try {
        sedangKirim = true;
        tampilInfo('Mengirim jawaban ke Google Sheet...');

        // text/plain dipakai agar tidak terkena preflight CORS Apps Script.
        await fetch(GAS_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });

        tampilInfo(`Jawaban berhasil dikirim. Skor: ${skor}/${bankSoal.length}`);
        document.getElementById('areaUjian').classList.add('hidden');
      } catch (error) {
        tampilInfo('Gagal mengirim jawaban: ' + error.message);
      } finally {
        sedangKirim = false;
      }
    }

    function acakArray(arr) {
      return [...arr].sort(() => Math.random() - 0.5);
    }

    function tampilInfo(pesan) {
      const area = document.getElementById('areaInfo');
      area.textContent = pesan;
      area.classList.remove('hidden');
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function cssEscape(value) {
      if (window.CSS && CSS.escape) return CSS.escape(value);
      return String(value).replace(/[^a-zA-Z0-9_-]/g, '\\$&');
    }
  </script>
</body>
</html>

====================================================================
KODE GOOGLE APPS SCRIPT
====================================================================
1. Buka Google Sheet Anda.
2. Klik Extensions / Ekstensi > Apps Script.
3. Hapus kode lama, lalu tempel kode di bawah ini.
4. Klik Deploy > New deployment > Web app.
5. Execute as: Me.
6. Who has access: Anyone.
7. Copy URL Web App, lalu tempel ke konstanta GAS_URL di HTML.
====================================================================

const SPREADSHEET_ID = '1EzL4T8XGP2W5rC-7KsnOTFghKqtHxjpS6FzfnhR6JPg';
const SHEET_SOAL = 'soal';
const SHEET_RESPON = 'respon';

function doGet(e) {
  const action = e.parameter.action;

  if (action === 'getSoal') {
    return jsonOutput({ success: true, data: getSoal() });
  }

  return jsonOutput({ success: false, message: 'Action tidak dikenal.' });
}

function doPost(e) {
  try {
    const body = JSON.parse(e.postData.contents || '{}');

    if (body.action === 'saveRespon') {
      saveRespon(body);
      return jsonOutput({ success: true, message: 'Respon berhasil disimpan.' });
    }

    return jsonOutput({ success: false, message: 'Action tidak dikenal.' });
  } catch (err) {
    return jsonOutput({ success: false, message: err.message });
  }
}

function getSoal() {
  const ss = SpreadsheetApp.openById(SPREADSHEET_ID);
  const sheet = ss.getSheetByName(SHEET_SOAL);
  const values = sheet.getDataRange().getValues();

  return values.slice(1)
    .filter(row => row[0])
    .map(row => ({
      idsoal: String(row[0]).trim(),
      benar: String(row[1]).trim(),
      salah: [row[2], row[3], row[4], row[5]]
        .map(value => String(value).trim())
        .filter(Boolean)
    }));
}

function saveRespon(data) {
  const ss = SpreadsheetApp.openById(SPREADSHEET_ID);
  const sheetSoal = ss.getSheetByName(SHEET_SOAL);
  const sheetRespon = ss.getSheetByName(SHEET_RESPON) || ss.insertSheet(SHEET_RESPON);

  const soalValues = sheetSoal.getDataRange().getValues();
  const idSoal = soalValues.slice(1).filter(row => row[0]).map(row => String(row[0]).trim());

  const header = ['timestamp', 'nama', 'email', ...idSoal, 'skor', 'total'];

  if (sheetRespon.getLastRow() === 0) {
    sheetRespon.appendRow(header);
  } else {
    const existingHeader = sheetRespon.getRange(1, 1, 1, Math.max(sheetRespon.getLastColumn(), header.length)).getValues()[0];
    const perluUpdateHeader = header.some((h, i) => existingHeader[i] !== h);
    if (perluUpdateHeader) {
      sheetRespon.getRange(1, 1, 1, header.length).setValues([header]);
    }
  }

  const row = [
    new Date(),
    data.nama || '',
    data.email || '',
    ...idSoal.map(id => data.jawaban && data.jawaban[id] ? data.jawaban[id] : ''),
    data.skor || 0,
    data.total || idSoal.length
  ];

  sheetRespon.appendRow(row);
}

function jsonOutput(obj) {
  return ContentService
    .createTextOutput(JSON.stringify(obj))
    .setMimeType(ContentService.MimeType.JSON);
}
