<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Admin Ujian</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <link rel="stylesheet" href="./css/style.css" />

  <script src="./js/config.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/admin.js" defer></script>
</head>

<body class="bg-slate-100 min-h-screen text-slate-800">

  <main class="max-w-7xl mx-auto p-4 md:p-8">


    <section id="loginAdminBox" class="bg-white rounded-3xl shadow-lg p-6 mb-6 max-w-md mx-auto">
  <h1 class="text-2xl font-bold mb-4">Login Admin</h1>

  <div class="space-y-4">
    <div>
      <label class="font-semibold block mb-2">Username</label>
      <input id="adminUsername" type="text" class="w-full border rounded-2xl p-3" />
    </div>

    <div>
      <label class="font-semibold block mb-2">Password</label>
      <input id="adminPassword" type="password" class="w-full border rounded-2xl p-3" />
    </div>

    <button id="btnLoginAdmin" class="w-full px-5 py-3 rounded-2xl bg-purple-600 text-white font-semibold">
      Login
    </button>
  </div>
</section>

<section id="dashboardAdmin" class="hidden">
    <!-- HEADER -->
    <section class="bg-white rounded-3xl shadow-lg p-6 mb-6">

      <div class="flex flex-wrap items-center justify-between gap-4">

        <div>
          <h1 class="text-3xl font-bold mb-2">
            Dashboard Admin
          </h1>

          <p class="text-slate-600">
            Monitoring ujian peserta
          </p>
        </div>

        <a
          href="./index.html"
          class="px-5 py-3 rounded-2xl bg-slate-700 text-white hover:bg-slate-800 font-semibold shadow transition">
          Halaman Peserta
        </a>

      </div>

    </section>

    <!-- STATISTIK -->
    <section class="grid md:grid-cols-4 gap-4 mb-6">

      <div class="bg-white rounded-3xl shadow p-5">
        <p class="text-sm text-slate-500 mb-1">
          Total Soal
        </p>

        <h2
          id="statSoal"
          class="text-3xl font-bold">
          0
        </h2>
      </div>

      <div class="bg-white rounded-3xl shadow p-5">
        <p class="text-sm text-slate-500 mb-1">
          Sudah Submit
        </p>

        <h2
          id="statSubmit"
          class="text-3xl font-bold">
          0
        </h2>
      </div>

      <div class="bg-white rounded-3xl shadow p-5">
        <p class="text-sm text-slate-500 mb-1">
          Sedang Mengerjakan
        </p>

        <h2
          id="statMengerjakan"
          class="text-3xl font-bold">
          0
        </h2>
      </div>

      <div class="bg-white rounded-3xl shadow p-5">
        <p class="text-sm text-slate-500 mb-1">
          Durasi
        </p>

        <h2
          id="statDurasi"
          class="text-3xl font-bold">
          60
        </h2>
      </div>

    </section>

    <!-- IMPORT -->
    <section class="bg-white rounded-3xl shadow-lg p-6 mb-6">

      <div class="flex flex-wrap items-center justify-between gap-4 mb-5">

        <div>
          <h2 class="text-2xl font-bold">
            Import Soal
          </h2>

          <p class="text-slate-500 text-sm mt-1">
            Format Excel:
            idsoal,
            jawaban benar,
            jawaban salah 1-4
          </p>
        </div>

      </div>

      <div class="flex flex-col md:flex-row gap-4">

        <input
          id="fileImport"
          type="file"
          accept=".xlsx,.xls,.csv"
          class="flex-1 border rounded-2xl p-3 bg-white"
        />

        <button
          id="btnImport"
          class="px-6 py-3 rounded-2xl bg-blue-600 text-white hover:bg-blue-700 font-semibold shadow transition">
          Import Excel
        </button>

      </div>

    </section>

    <!-- INFO -->
    <section
      id="adminInfo"
      class="hidden bg-amber-50 border border-amber-200 rounded-2xl p-4 mb-6">
    </section>

    <!-- TABEL -->
    <section class="grid xl:grid-cols-2 gap-6">

      <!-- SUDAH SUBMIT -->
      <div class="bg-white rounded-3xl shadow-lg p-6">

        <div class="flex flex-wrap items-center justify-between gap-3 mb-4">

          <h2 class="text-2xl font-bold">
            Sudah Submit
          </h2>

          <div class="flex items-center gap-2 text-sm">

            <span>Tampilkan</span>

            <select
              id="pageSizeSubmit"
              class="border rounded-xl px-3 py-2">

              <option value="10">10</option>
              <option value="25">25</option>
              <option value="50">50</option>
              <option value="100">100</option>

            </select>

          </div>

        </div>

        <div class="overflow-auto">

          <table
            id="tabelSubmit"
            class="min-w-full text-sm">
          </table>

        </div>

        <!-- PAGINATION -->
        <div class="mt-5 flex items-center justify-between gap-3">

          <button
            id="prevSubmit"
            class="px-4 py-2 rounded-xl border hover:bg-slate-50">
            Sebelumnya
          </button>

          <div
            id="infoPageSubmit"
            class="text-sm text-slate-500">
            Halaman 1
          </div>

          <button
            id="nextSubmit"
            class="px-4 py-2 rounded-xl border hover:bg-slate-50">
            Berikutnya
          </button>

        </div>

      </div>

      <!-- SEDANG MENGERJAKAN -->
      <div class="bg-white rounded-3xl shadow-lg p-6">

        <div class="flex items-center justify-between gap-3 mb-4">

          <h2 class="text-2xl font-bold">
            Sedang Mengerjakan
          </h2>

          <span class="text-sm text-slate-500">
            10 data / halaman
          </span>

        </div>

        <div class="overflow-auto">

          <table
            id="tabelMengerjakan"
            class="min-w-full text-sm">
          </table>

        </div>

        <!-- PAGINATION -->
        <div class="mt-5 flex items-center justify-between gap-3">

          <button
            id="prevMengerjakan"
            class="px-4 py-2 rounded-xl border hover:bg-slate-50">
            Sebelumnya
          </button>

          <div
            id="infoPageMengerjakan"
            class="text-sm text-slate-500">
            Halaman 1
          </div>

          <button
            id="nextMengerjakan"
            class="px-4 py-2 rounded-xl border hover:bg-slate-50">
            Berikutnya
          </button>

        </div>

      </div>

    </section>

  </main>

</body>
</html>
